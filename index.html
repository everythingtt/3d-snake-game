<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Snake Game - Space Journey</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="500x500" href="favicon/favicon.png">

    <!-- OpenGraph Metadata -->
    <meta property="og:title" content="3D Snake Game - Space Journey">
    <meta property="og:description" content="A thrilling 3D snake experience set in a deep space starfield. Collect energy spheres and grow your snake!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon/favicon.png">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    
    <!-- Twitter Metadata -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="3D Snake Game - Space Journey">
    <meta name="twitter:description" content="Control the snake in a 3D starfield. High scores, particle effects, and procedural music!">
    <meta name="twitter:image" content="favicon/favicon.png">

    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h1>3D Snake Game</h1>
        <p>Use Arrow Keys to move</p>
        <p>Score: <span id="score">0</span> | High: <span id="high-score">0</span> | Coins: <span id="coins">0</span></p>
        <button id="mute-btn" class="icon-btn">🔊</button>
    </div>
    <div id="overlay">
        <div id="menu">
            <h1>3D Snake</h1>
            <p>Space Journey</p>
            <div id="high-score-display">High Score: <span id="menu-high-score">0</span></div>
            <div id="coin-display">Coins: <span id="menu-coins">0</span></div>
            <div class="menu-buttons">
                <button id="start-btn">Start Game</button>
                <button id="shop-btn">Open Shop</button>
            </div>
        </div>
    </div>
    <div id="shop-overlay" style="display: none;">
        <div id="shop">
            <div class="shop-tabs">
                <button id="tab-skins" class="active">Skins</button>
                <button id="tab-backgrounds">Backgrounds</button>
            </div>
            <div id="skin-preview-container"></div>
            <div id="shop-content">
                <div id="skin-list"></div>
                <div id="bg-list" style="display: none;"></div>
            </div>
            <button id="close-shop-btn">Back to Menu</button>
        </div>
    </div>
    <div id="game-container"></div>
    <div id="notification-container"></div>
    <div id="glitch-overlay" style="display: none;"></div>
    <script type="module" src="game.js"></script>
</body>
</html>
