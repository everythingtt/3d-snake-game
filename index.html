<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Snake Game - Space Journey</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="500x500" href="favicon/favicon.png">

    <!-- OpenGraph Metadata -->
    <meta property="og:title" content="3D Snake Game - Space Journey">
    <meta property="og:description" content="A thrilling 3D snake experience set in a deep space starfield. Collect energy spheres and grow your snake!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon/favicon.png">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    
    <!-- Twitter Metadata -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="3D Snake Game - Space Journey">
    <meta name="twitter:description" content="Control the snake in a 3D starfield. High scores, particle effects, and procedural music!">
    <meta name="twitter:image" content="favicon/favicon.png">

    <link rel="stylesheet" href="style.css?v=1.0.1">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h1 data-t="game_title">3D Snake Game</h1>
        <p data-t="controls">Use Arrow Keys to move</p>
        <p><span data-t="score">Score</span>: <span id="score">0</span> | <span data-t="high">High</span>: <span id="high-score">0</span> | <span data-t="coins">Coins</span>: <span id="coins">0</span></p>
        <div class="hud-controls">
            <button id="mod-picker-btn" class="icon-btn" style="display: none;">🧩</button>
            <button id="perf-btn" class="icon-btn">⚡</button>
            <button id="pause-btn" class="icon-btn">⏸</button>
            <button id="mute-btn" class="icon-btn">🔊</button>
            <select id="lang-select" class="lang-switcher">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="zh">中文</option>
            </select>
        </div>
    </div>
    <div id="overlay">
        <div id="menu">
            <h1 data-t="game_title">3D Snake</h1>
            <p data-t="space_journey">Space Journey</p>
            <div id="high-score-display"><span data-t="high">High Score</span>: <span id="menu-high-score">0</span></div>
            <div id="coin-display"><span data-t="coins">Coins</span>: <span id="menu-coins">0</span></div>
            <div class="menu-buttons">
                <button id="start-btn" data-t="start_game">Start Game</button>
                <button id="shop-btn" data-t="open_shop">Open Shop</button>
            </div>
        </div>
    </div>
    <div id="shop-overlay" style="display: none;">
        <div id="shop">
            <div class="shop-tabs">
                <button id="tab-skins" class="active" data-t="skins">Skins</button>
                <button id="tab-backgrounds" data-t="backgrounds">Backgrounds</button>
            </div>
            <div id="skin-preview-container"></div>
            <div id="shop-content">
                <div id="skin-list"></div>
                <div id="bg-list" style="display: none;"></div>
            </div>
            <button id="close-shop-btn" data-t="back_to_menu">Back to Menu</button>
        </div>
    </div>
    <div id="mod-picker-overlay" style="display: none;">
        <div id="mod-picker">
            <h2 data-t="mod_picker">Mod Picker</h2>
            <div id="mod-list"></div>
            <button id="close-mod-picker-btn" data-t="back_to_menu">Back to Menu</button>
        </div>
    </div>
    <div id="touch-controls" style="display: none;" dir="ltr">
        <div class="touch-row">
            <button id="up-btn" class="touch-btn">▲</button>
        </div>
        <div class="touch-row">
            <button id="left-btn" class="touch-btn">◀</button>
            <button id="down-btn" class="touch-btn">▼</button>
            <button id="right-btn" class="touch-btn">▶</button>
        </div>
    </div>
    <div id="game-container"></div>
    <div id="notification-container"></div>
    <div id="glitch-overlay" style="display: none;"></div>
    <script type="module" src="game.js?v=1.0.1"></script>
</body>
</html>
