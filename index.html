<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Snake Game - Space Journey</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="500x500" href="favicon/favicon.png">

    <!-- OpenGraph Metadata -->
    <meta property="og:title" content="3D Snake Game - Space Journey">
    <meta property="og:description" content="A thrilling 3D snake experience set in a deep space starfield. Collect energy spheres and grow your snake!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon/favicon.png">
    <meta property="og:image:width" content="500">
    <meta property="og:image:height" content="500">
    
    <!-- Twitter Metadata -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="3D Snake Game - Space Journey">
    <meta name="twitter:description" content="Control the snake in a 3D starfield. High scores, particle effects, and procedural music!">
    <meta name="twitter:image" content="favicon/favicon.png">

    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h1 data-t="title">3D Snake Game</h1>
        <p data-t="move_hint">Use Arrow Keys to move</p>
        <p>
            <span data-t="score">Score</span>: <span id="score">0</span> | 
            <span data-t="high">High</span>: <span id="high-score">0</span> | 
            <span data-t="coins">Coins</span>: <span id="coins">0</span>
        </p>
        <div class="top-controls">
            <div id="lang-switcher">
                <button onclick="LanguageManager.set('en')" title="English">EN</button>
                <button onclick="LanguageManager.set('ar')" title="العربية">AR</button>
                <button onclick="LanguageManager.set('zh')" title="中文">ZH</button>
            </div>
            <button id="mute-btn" class="icon-btn">🔊</button>
        </div>
    </div>
    <div id="overlay">
        <div id="menu">
            <h1 data-t="title">3D Snake</h1>
            <p data-t="subtitle">Space Journey</p>
            <div id="high-score-display"><span data-t="high">High Score</span>: <span id="menu-high-score">0</span></div>
            <div id="coin-display"><span data-t="coins">Coins</span>: <span id="menu-coins">0</span></div>
            <div class="menu-buttons">
                <button id="start-btn" data-t="start">Start Game</button>
                <button id="shop-btn" data-t="shop">Open Shop</button>
            </div>
        </div>
    </div>
    <div id="shop-overlay" style="display: none;">
        <div id="shop">
            <div class="shop-tabs">
                <button id="tab-skins" class="active" data-t="skins">Skins</button>
                <button id="tab-backgrounds" data-t="backgrounds">Backgrounds</button>
                <button id="tab-mods" data-t="mods">Mods</button>
            </div>
            <div id="skin-preview-container"></div>
            <div id="shop-content">
                <div id="skin-list"></div>
                <div id="bg-list" style="display: none;"></div>
                <div id="mod-management" style="display: none;">
                    <div class="mod-upload-zone">
                        <input type="file" id="mod-folder-input" webkitdirectory directory multiple style="display: none;">
                        <button id="upload-mod-btn" class="action-btn" data-t="upload_mod">Upload Mod Folder</button>
                    </div>
                    <div id="mod-list"></div>
                </div>
            </div>
            <button id="close-shop-btn" data-t="back">Back to Menu</button>
        </div>
    </div>
    <div id="game-container"></div>
    <div id="notification-container"></div>
    <div id="glitch-overlay" style="display: none;"></div>
    <script type="module" src="game.js"></script>
</body>
</html>
